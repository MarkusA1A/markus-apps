<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meditation Bell - Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 400px;
        }
        h1 {
            color: #667eea;
            margin-bottom: 30px;
        }
        button {
            padding: 15px 40px;
            font-size: 18px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 10px;
        }
        button:hover {
            background: #764ba2;
            transform: scale(1.05);
        }
        button:active {
            transform: scale(0.95);
        }
        .info {
            margin-top: 30px;
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }
        .status {
            margin-top: 20px;
            font-size: 16px;
            color: #2ecc71;
            font-weight: bold;
            min-height: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔔 Meditation Bell Test</h1>
        <p>Höre den Ton für das Ende der Meditationen:</p>
        
        <button onclick="playBell()">🔊 Bell abspielen</button>
        
        <div class="status" id="status"></div>
        
        <div class="info">
            <p><strong>Beschreibung:</strong></p>
            <p>🥉 Tibetische Zimbeln — hell, metallisch, mit Shimmer & Chime. Schneller Attack, schimmernder Ausklang.</p>
            <p style="font-size: 12px; margin-top: 20px; color: #999;">
                Wenn dir der Ton gefällt → bestätige in Telegram<br>
                Wenn nicht → sag mir eine Alternative!
            </p>
        </div>
    </div>

    <script>
        function playBell() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const now = audioContext.currentTime;
            
            // Create multiple oscillators for Tibetan Cymbals effect (bright, metallic)
            const osc1 = audioContext.createOscillator();
            const osc2 = audioContext.createOscillator();
            const osc3 = audioContext.createOscillator();
            const osc4 = audioContext.createOscillator();
            const gain1 = audioContext.createGain();
            const gain2 = audioContext.createGain();
            const gain3 = audioContext.createGain();
            const gain4 = audioContext.createGain();
            const masterGain = audioContext.createGain();
            
            // Create noise for metallic shimmer
            const noiseBuffer = audioContext.createBuffer(1, audioContext.sampleRate * 2, audioContext.sampleRate);
            const noiseData = noiseBuffer.getChannelData(0);
            for (let i = 0; i < noiseBuffer.length; i++) {
                noiseData[i] = Math.random() * 2 - 1;
            }
            const noiseSource = audioContext.createBufferSource();
            noiseSource.buffer = noiseBuffer;
            noiseSource.loop = true;
            const noiseGain = audioContext.createGain();
            noiseSource.connect(noiseGain);
            
            // Connect oscillators and noise to master
            osc1.connect(gain1);
            osc2.connect(gain2);
            osc3.connect(gain3);
            osc4.connect(gain4);
            gain1.connect(masterGain);
            gain2.connect(masterGain);
            gain3.connect(masterGain);
            gain4.connect(masterGain);
            noiseGain.connect(masterGain);
            masterGain.connect(audioContext.destination);
            
            // Main tone (D5, 587 Hz)
            osc1.frequency.setValueAtTime(587, now);
            osc1.frequency.exponentialRampToValueAtTime(560, now + 2);
            osc1.type = 'sine';
            gain1.gain.setValueAtTime(0.2, now);
            gain1.gain.exponentialRampToValueAtTime(0.001, now + 2.5);
            
            // Bright harmonic (2x, ~1174 Hz)
            osc2.frequency.setValueAtTime(1174, now);
            osc2.frequency.exponentialRampToValueAtTime(1100, now + 2);
            osc2.type = 'sine';
            gain2.gain.setValueAtTime(0.18, now);
            gain2.gain.exponentialRampToValueAtTime(0.001, now + 2);
            
            // High shimmer (4x, ~2348 Hz)
            osc3.frequency.setValueAtTime(2348, now);
            osc3.frequency.exponentialRampToValueAtTime(2150, now + 1.5);
            osc3.type = 'sine';
            gain3.gain.setValueAtTime(0.12, now);
            gain3.gain.exponentialRampToValueAtTime(0.001, now + 1.8);
            
            // Very high chime (6x, ~3522 Hz)
            osc4.frequency.setValueAtTime(3522, now);
            osc4.frequency.exponentialRampToValueAtTime(3200, now + 1.2);
            osc4.type = 'sine';
            gain4.gain.setValueAtTime(0.08, now);
            gain4.gain.exponentialRampToValueAtTime(0.001, now + 1.5);
            
            // Metallic noise shimmer
            noiseGain.gain.setValueAtTime(0.15, now);
            noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 1.5);
            
            // Master volume - quick attack, medium decay
            masterGain.gain.setValueAtTime(0.5, now);
            masterGain.gain.exponentialRampToValueAtTime(0.001, now + 2.5);
            
            osc1.start(now);
            osc2.start(now);
            osc3.start(now);
            osc4.start(now);
            noiseSource.start(now);
            osc1.stop(now + 2.5);
            osc2.stop(now + 2.5);
            osc3.stop(now + 2.5);
            osc4.stop(now + 2.5);
            noiseSource.stop(now + 2.5);
            
            // Status feedback
            document.getElementById('status').textContent = '🔔 Tibetische Zimbeln klingen...';
            setTimeout(() => {
                document.getElementById('status').textContent = '';
            }, 3000);
        }
        
        // Auto-play on load for quick test
        window.addEventListener('load', () => {
            setTimeout(() => {
                // Uncomment to auto-play:
                // playBell();
            }, 500);
        });
    </script>
</body>
</html>
