<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meditation Bell - Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 400px;
        }
        h1 {
            color: #667eea;
            margin-bottom: 30px;
        }
        button {
            padding: 15px 40px;
            font-size: 18px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 10px;
        }
        button:hover {
            background: #764ba2;
            transform: scale(1.05);
        }
        button:active {
            transform: scale(0.95);
        }
        .info {
            margin-top: 30px;
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }
        .status {
            margin-top: 20px;
            font-size: 16px;
            color: #2ecc71;
            font-weight: bold;
            min-height: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔔 Meditation Bell Test</h1>
        <p>Höre den Ton für das Ende der Meditationen:</p>
        
        <button onclick="playBell()">🔊 Bell abspielen</button>
        
        <div class="status" id="status"></div>
        
        <div class="info">
            <p><strong>Beschreibung:</strong></p>
            <p>🏔️ Tibetan Singing Bowl — warm, resonant, mit natürlichen Obertönen. Lange, beruhigende Sustain.</p>
            <p style="font-size: 12px; margin-top: 20px; color: #999;">
                Wenn dir der Ton gefällt → bestätige in Telegram<br>
                Wenn nicht → sag mir eine Alternative!
            </p>
        </div>
    </div>

    <script>
        function playBell() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const now = audioContext.currentTime;
            
            // Create multiple oscillators for Tibetan Singing Bowl effect
            const osc1 = audioContext.createOscillator();
            const osc2 = audioContext.createOscillator();
            const osc3 = audioContext.createOscillator();
            const gain1 = audioContext.createGain();
            const gain2 = audioContext.createGain();
            const gain3 = audioContext.createGain();
            const masterGain = audioContext.createGain();
            
            // Connect oscillators to gains to master
            osc1.connect(gain1);
            osc2.connect(gain2);
            osc3.connect(gain3);
            gain1.connect(masterGain);
            gain2.connect(masterGain);
            gain3.connect(masterGain);
            masterGain.connect(audioContext.destination);
            
            // Fundamental tone (around A4, 440 Hz) - HIGHER
            osc1.frequency.setValueAtTime(440, now);
            osc1.frequency.exponentialRampToValueAtTime(410, now + 5);
            osc1.type = 'sine';
            gain1.gain.setValueAtTime(0.25, now);
            gain1.gain.exponentialRampToValueAtTime(0.001, now + 5);
            
            // First harmonic (3x fundamental)
            osc2.frequency.setValueAtTime(1320, now);
            osc2.frequency.exponentialRampToValueAtTime(1230, now + 5);
            osc2.type = 'sine';
            gain2.gain.setValueAtTime(0.15, now);
            gain2.gain.exponentialRampToValueAtTime(0.001, now + 5);
            
            // Second harmonic (5x fundamental) - adds warmth
            osc3.frequency.setValueAtTime(2200, now);
            osc3.frequency.exponentialRampToValueAtTime(2050, now + 5);
            osc3.type = 'sine';
            gain3.gain.setValueAtTime(0.1, now);
            gain3.gain.exponentialRampToValueAtTime(0.001, now + 5);
            
            // Master volume - long sustain
            masterGain.gain.setValueAtTime(0.4, now);
            masterGain.gain.exponentialRampToValueAtTime(0.05, now + 1);
            masterGain.gain.exponentialRampToValueAtTime(0.001, now + 5);
            
            osc1.start(now);
            osc2.start(now);
            osc3.start(now);
            osc1.stop(now + 5);
            osc2.stop(now + 5);
            osc3.stop(now + 5);
            
            // Status feedback
            document.getElementById('status').textContent = '🔔 Tibetan Singing Bowl klingt...';
            setTimeout(() => {
                document.getElementById('status').textContent = '';
            }, 5500);
        }
        
        // Auto-play on load for quick test
        window.addEventListener('load', () => {
            setTimeout(() => {
                // Uncomment to auto-play:
                // playBell();
            }, 500);
        });
    </script>
</body>
</html>
